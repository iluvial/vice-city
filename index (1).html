<!doctype html>
<html lang="en-us">

<body
    data-is-touch="0"
    data-state-car="0"
    data-state-car-gun="0"
    data-state-gun="0"
    data-state-bike="0"
    data-state-menu="1"
    data-state-cutscene="0"
    data-state-mobring="0"
    data-state-job="0"
    data-state-disable-controls="0"
    data-state-panzer="0"
    data-state-car-with-weapon="0"
    data-state-hunter="0"
    data-state-scope-mode="0"
    data-state-scope-gun="0"
>

    <!-- ⭐ FULLSCREEN BUTTON -->
    <button id="fullscreen-btn" class="fullscreen-button">FULLSCREEN</button>

    <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING... </div>

    <div class="intro-container" hidden>

                <div class="progress-bar-fill"></div>

            </div>
        </div>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div class="touch-controls-wrapper">

        <div id="look"></div>

        <div class="touch-control right"></div>

        <div class="touch-control car getOut"></div>
        <div class="touch-control camera"></div>
        <div class="touch-control mobile"></div>
        <div class="touch-control job"></div>
        <div class="touch-control horn"></div>
        <div class="touch-control fireRight"></div>
        <div class="touch-control fireLeft"></div>
    </div>

<script>
alert("Thank you to bread for this port! Make sure to use gn-math for the best games and web ports, all links at discord.gg/gn-math or check out my partners page ❤️");

const loadingText = document.querySelector("#loading-text");
let loadedBytes = 0;
const DB_NAME = "gameFilesDB";
const STORE_NAME = "files";

// Open or create IndexedDB
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
            }
        };
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e.target.error);
    });
}

// Save file to IndexedDB
async function saveFile(name, buffer) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        store.put(buffer, name);
        tx.oncomplete = () => resolve();
        tx.onerror = e => reject(e.target.error);
    });
}

// Get file from IndexedDB
async function getFile(name) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(name);
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e.target.error);
    });
}

// Fetch with progress and caching
async function fetchWithCache(name, url) {
    let cached = await getFile(name);
    if (cached) return cached;

    const response = await fetch(url);
    const reader = response.body.getReader();
    let chunks = [];
    let received = 0;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);

        let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        let mbTotal = '633.45';
        loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
    }

    let fullBuffer = new Uint8Array(received);
    let offset = 0;
    for (let chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
    }

    await saveFile(name, fullBuffer.buffer);
    return fullBuffer.buffer;
}

// Merge multiple parts
async function mergeFiles(fileParts, namePrefix) {
    const buffers = [];
    for (let i = 0; i < fileParts.length; i++) {
        const buffer = await fetchWithCache(`${namePrefix}.part${i+1}`, fileParts[i]);
        buffers.push(buffer);
    }
    const mergedBlob = new Blob(buffers);
    return URL.createObjectURL(mergedBlob);
}

// Generate part URLs
function getParts(file, start, end) {
    let parts = [];
    for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
    }
    return parts;
}

// Start fetching and caching
Promise.all([
    mergeFiles(getParts("index.data", 1, 7), "index.data"),
    mergeFiles(getParts("audio/emotion.adf", 1, 3), "emotion.adf"),
    mergeFiles(getParts("audio/espant.adf", 1, 3), "espant.adf"),
    mergeFiles(getParts("audio/fever.adf", 1, 3), "fever.adf"),
    mergeFiles(getParts("audio/flash.adf", 1, 3), "flash.adf"),
    mergeFiles(getParts("audio/kchat.adf", 1, 3), "kchat.adf"),
    mergeFiles(getParts("audio/vcpr.adf", 1, 2), "vcpr.adf"),
    mergeFiles(getParts("audio/vrock.adf", 1, 4), "vrock.adf"),
    mergeFiles(getParts("audio/wave.adf", 1, 4), "wave.adf"),
    mergeFiles(getParts("audio/wild.adf", 1, 4), "wild.adf"),
]).then(([indexdataurl, EMOTIONadfurl, ESPANTadfurl, FEVERadfurl, FLASHadfurl, KCHATadfurl, VCPRadfurl, VROCKadfurl, WAVEadfurl, WILDadfurl]) => {

    const originalFetch = window.fetch;
    window.fetch = async function(input, init) {
        let urlString = input instanceof Request ? input.url : String(input);

        if (urlString.toLowerCase().includes("index.data")) input = indexdataurl;
        else if (urlString.toLowerCase().includes("emotion.adf")) input = EMOTIONadfurl;
        else if (urlString.toLowerCase().includes("espant.adf")) input = ESPANTadfurl;
        else if (urlString.toLowerCase().includes("fever.adf")) input = FEVERadfurl;
        else if (urlString.toLowerCase().includes("flash.adf")) input = FLASHadfurl;
        else if (urlString.toLowerCase().includes("kchat.adf")) input = KCHATadfurl;
        else if (urlString.toLowerCase().includes("vcpr.adf")) input = VCPRadfurl;
        else if (urlString.toLowerCase().includes("vrock.adf")) input = VROCKadfurl;
        else if (urlString.toLowerCase().includes("wave.adf")) input = WAVEadfurl;
        else if (urlString.toLowerCase().includes("wild.adf")) input = WILDadfurl;

        return originalFetch(input.toLowerCase(), init);
    };

    const originalOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        if (url.includes("https://cdn.dos.zone/vcsky/fetched/")) url = url.replace("https://cdn.dos.zone/vcsky/fetched/", "");

        if (url.toLowerCase().includes("index.data")) url = indexdataurl;
        else if (url.toLowerCase().includes("emotion.adf")) url = EMOTIONadfurl;
        else if (url.toLowerCase().includes("espant.adf")) url = ESPANTadfurl;
        else if (url.toLowerCase().includes("fever.adf")) url = FEVERadfurl;
        else if (url.toLowerCase().includes("flash.adf")) url = FLASHadfurl;
        else if (url.toLowerCase().includes("kchat.adf")) url = KCHATadfurl;
        else if (url.toLowerCase().includes("vcpr.adf")) url = VCPRadfurl;
        else if (url.toLowerCase().includes("vrock.adf")) url = VROCKadfurl;
        else if (url.toLowerCase().includes("wave.adf")) url = WAVEadfurl;
        else if (url.toLowerCase().includes("wild.adf")) url = WILDadfurl;

        return originalOpen.call(this, method, url.toLowerCase(), ...rest);
    };

    ["gamepademulator.js", "idbfs.js", "game.js"].forEach(src => {
        const script = document.createElement("script");
        script.src = src;
        document.body.appendChild(script);
    });

    loadingText.remove();
});
</script>

<!-- ⭐ FULLSCREEN + MOUSE LOCK SCRIPT -->
<script>
// IMPORTANT: Google Sites embeds this page inside its own iframe
// (inner-frame-minified.html) which does NOT grant the "fullscreen"
// permissions-policy to its children, and that iframe is generated
// by Google, so we cannot add allow="fullscreen" to it ourselves.
// Workaround: open this same page in a brand new top-level tab,
// where it's no longer inside that restricted iframe, and request
// fullscreen there instead.
//
// Replace THIS_PAGE_URL below with the actual public URL this file
// is hosted at (e.g. your jsdelivr/CDN URL), NOT the Google Sites URL.
const THIS_PAGE_URL = "https://cdn.jsdelivr.net/gh/web-ports/vice-city@796678be4ed26a13c1256be98781ca9b90beb981/index.html";

function openFullscreen() {
    const inIframe = window.self !== window.top;

    if (inIframe) {
        // Can't go fullscreen inside Google Sites' iframe — open a real tab instead.
        const newTab = window.open(THIS_PAGE_URL, "_blank");
        if (!newTab) {
            alert("Please allow popups for this site to use fullscreen mode.");
        }
        return;
    }

    const el = document.documentElement; // fullscreen the whole page

    const requestFS = el.requestFullscreen
        || el.webkitRequestFullscreen
        || el.mozRequestFullScreen
        || el.msRequestFullscreen;

    if (requestFS) {
        requestFS.call(el).catch(err => {
            console.warn("Fullscreen request failed:", err);
        });
    } else {
        alert("Fullscreen API not supported in this browser.");
    }
}

// Lock the mouse pointer to the canvas once fullscreen is active
function lockPointer() {
    const canvas = document.getElementById("canvas");
    if (!canvas) return;

    const requestPL = canvas.requestPointerLock
        || canvas.mozRequestPointerLock
        || canvas.webkitRequestPointerLock;

    if (requestPL) {
        requestPL.call(canvas);
    }
}

function isFullscreen() {
    return document.fullscreenElement
        || document.webkitFullscreenElement
        || document.mozFullScreenElement
        || document.msFullscreenElement;
}

document.getElementById("fullscreen-btn").onclick = () => {
    openFullscreen();
};

// Once fullscreen actually engages, grab the pointer
["fullscreenchange", "webkitfullscreenchange", "mozfullscreenchange", "MSFullscreenChange"]
    .forEach(evt => document.addEventListener(evt, () => {
        if (isFullscreen()) {
            lockPointer();
        }
    }));

// Optional: re-lock pointer if it's lost while still fullscreen (e.g. user pressed Esc on lock only)
document.addEventListener("pointerlockchange", () => {
    if (!document.pointerLockElement && isFullscreen()) {
        // small delay helps avoid the browser blocking immediate re-lock
        setTimeout(lockPointer, 50);
    }
});
</script>
